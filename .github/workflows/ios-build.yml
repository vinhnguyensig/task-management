name: iOS Build and Test

on:
  push:
    branches: "*"
  pull_request:
    branches: "*"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install CocoaPods
        run: brew install cocoapods

      - name: Install dependencies
        run: pod install

      - name: Build project
        run: xcodebuild -workspace TaskManagement.xcworkspace -scheme TaskManagement -destination 'generic/platform=iOS' -archivePath build/TaskManagement.xcarchive archive -allowProvisioningUpdates


      - name: Run tests
        run: xcodebuild test -workspace TaskManagement.xcworkspace -scheme TaskManagement -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0'

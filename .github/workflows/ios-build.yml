name: iOS Build and Test

on:
  push:
    branches: "*"
  pull_request:
    branches: "*"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4' 

      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: |
            Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('Podfile.lock') }}

      - name: Install dependencies
        run: pod install

      - name: Build project
        run: xcodebuild -workspace task-management.xcworkspace -scheme task-management -destination 'generic/platform=iOS' -archivePath build/task-management.xcarchive archive 

      - name: Run tests
        run: xcodebuild test -workspace task-management.xcworkspace -scheme task-management -destination 'platform=iOS Simulator,name=iPhone 15' 
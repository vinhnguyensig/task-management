version: 2.1

jobs:
  build:
    macos:
      xcode: "15.4"
    steps:
      - checkout

      - run:
          name: Install Bundler
          command: gem install bundler

      - run: 
          name: Install Dependencies
          command: |
            bundle install
            pod install 
            
      - run:
          name: Build and Test
          command: |
            xcodebuild clean test -scheme TaskManagement -destination 'platform=iOS Simulator,name=iPhone 15 Pro Max,OS=17.0' 

workflows:
  version: 2
  build_and_test:
    jobs:
      - build